<h2 style="margin-top:30px;">
Leaderboard<br>
---------------           
</h2>

<div id="leaderboard"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
collection,
getDocs,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAw4cJY7oXYrXRyvawehCU7TKCRg5ZS6GY",
authDomain: "world-cup-prediction-1ebca.firebaseapp.com",
projectId: "world-cup-prediction-1ebca",
storageBucket: "world-cup-prediction-1ebca.firebasestorage.app",
messagingSenderId: "950989220636",
appId: "1:950989220636:web:cd9f82db31549fad3068d9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveAllResults = async function(){

const matches = [];

for(let i=1;i<=8;i++){

const selected = document.querySelector(
`input[name="match${i}"]:checked`
);

if(!selected){
alert("Select result for Match " + i);
return;
}

await setDoc(
doc(db,"phase2_results",`match${i}`),
{
winner:selected.value
}
);

matches.push(selected.value);
}

const snapshot =
await getDocs(collection(db,"phase2_predictions"));

for(const userDoc of snapshot.docs){

const data = userDoc.data();

let points = 0;

for(let i=1;i<=8;i++){

if(data[`match${i}`] === matches[i-1]){
points += 2;
}

}

await updateDoc(
doc(db,"phase2_predictions",userDoc.id),
{
points: points
}
);

}

await loadLeaderboard();
alert("All Results Saved & Points Updated");

}

async function loadLeaderboard(){

const leaderboard =
document.getElementById("leaderboard");

const snapshot =
await getDocs(collection(db,"phase2_predictions"));

const users = [];

snapshot.forEach((doc)=>{
users.push(doc.data());
});

users.sort((a,b)=>
(b.points || 0) - (a.points || 0)
);

leaderboard.innerHTML = "";

users.forEach((user,index)=>{

leaderboard.innerHTML += `
<div class="rank-card">
<div>
<b>#${index+1} ${user.name}</b>
</div>

<div>
${user.points || 0} pts
</div>
</div>
`;

});

}

loadLeaderboard();
</script>
