<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{
background:#020617;
color:white;
font-family:Poppins,sans-serif;
padding:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input{
width:80px;
padding:10px;
border:none;
border-radius:10px;
margin:5px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-weight:700;
cursor:pointer;
}

.rank-card{
background:#0f172a;
padding:15px;
border-radius:15px;
margin-bottom:10px;

display:flex;
justify-content:space-between;
align-items:center;
}
</style>
</head>

<body>

<h1>🏆 FIFA Prediction Admin Panel</h1>

<div class="card">
<h2>Africa vs Canada</h2>
<input type="number" id="home1" placeholder="Home">
<input type="number" id="away1" placeholder="Away">
</div>

<div class="card">
<h2>Brazil vs japan</h2>
<input type="number" id="home2" placeholder="Home">
<input type="number" id="away2" placeholder="Away">
</div>

<div class="card">
<h2>Germany vs Paraguay</h2>
<input type="number" id="home3" placeholder="Home">
<input type="number" id="away3" placeholder="Away">
</div>

<div class="card">
<h2>Nethrlands vs Morocco</h2>
<input type="number" id="home4" placeholder="Home">
<input type="number" id="away4" placeholder="Away">
</div>

<div class="card">
<h2>Ivory coast vs Norway</h2>
<input type="number" id="home5" placeholder="Home">
<input type="number" id="away5" placeholder="Away">
</div>

<div class="card">
<h2>France vs Sweden</h2>
<input type="number" id="home6" placeholder="Home">
<input type="number" id="away6" placeholder="Away">
</div>

<div class="card">
<h2>Mexico vs Ecuador</h2>
<input type="number" id="home7" placeholder="Home">
<input type="number" id="away7" placeholder="Away">
</div>

<div class="card">
<h2>england vs Congo</h2>
<input type="number" id="home8" placeholder="Home">
<input type="number" id="away8" placeholder="Away">
</div>

<button onclick="saveAllResults()">
Save All Results
</button>

<h2 style="margin-top:30px;">
Leaderboard<br>
---------------           
</h2>

<div id="leaderboard"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
collection,
getDocs,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAw4cJY7oXYrXRyvawehCU7TKCRg5ZS6GY",
authDomain: "world-cup-prediction-1ebca.firebaseapp.com",
projectId: "world-cup-prediction-1ebca",
storageBucket: "world-cup-prediction-1ebca.firebasestorage.app",
messagingSenderId: "950989220636",
appId: "1:950989220636:web:cd9f82db31549fad3068d9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveAllResults = async function(){

const matches = [];

for(let i=1;i<=6;i++){

const home =
document.getElementById(`home${i}`).value;

const away =
document.getElementById(`away${i}`).value;

await setDoc(
doc(db,"results",`match${i}`),
{
home:Number(home),
away:Number(away)
}
);

matches.push(home + "-" + away);
}

const snapshot =
await getDocs(collection(db,"predictions"));

for(const userDoc of snapshot.docs){

const data = userDoc.data();

let points = 0;

for(let i=1;i<=6;i++){

if(data[`match${i}`] === matches[i-1]){
points += 2;
}

}

await updateDoc(
doc(db,"predictions",userDoc.id),
{
points: points
}
);

}

await loadLeaderboard();
alert("All Results Saved & Points Updated");

}

async function loadLeaderboard(){

const leaderboard =
document.getElementById("leaderboard");

const snapshot =
await getDocs(collection(db,"predictions"));

const users = [];

snapshot.forEach((doc)=>{
users.push(doc.data());
});

users.sort((a,b)=>
(b.points || 0) - (a.points || 0)
);

leaderboard.innerHTML = "";

users.forEach((user,index)=>{

leaderboard.innerHTML += `
<div class="rank-card">
<div>
<b>#${index+1} ${user.name}</b>
</div>

<div>
${user.points || 0} pts
</div>
</div>
`;

});

}

loadLeaderboard();
</script>
</body>
</html>
