<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{
background:#020617;
color:white;
font-family:Poppins,sans-serif;
padding:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input{
width:80px;
padding:10px;
border:none;
border-radius:10px;
margin:5px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-weight:700;
cursor:pointer;
}

.rank-card{
background:#0f172a;
padding:15px;
border-radius:15px;
margin-bottom:10px;

display:flex;
justify-content:space-between;
align-items:center;
}
</style>
</head>

<body>

<h1>FIFA Prediction Admin Panel</h1>

<div class="card">
<h2>France vs England</h2>
<label>
<input type="radio" name="match1" value="FRA">
france
</label>

<label>
<input type="radio" name="match1" value="ENG">
England
</label>
</div>
<button onclick="saveResult(2)">
Save Result
</button>
<div class="card">
<h2>SPA vs arg</h2>
<label>
<input type="radio" name="match2" value="SPA">
Spain
</label>

<label>
<input type="radio" name="match2" value="ARG">
Argentina
</label>
</div>
<button onclick="saveResult(1)">
Save Result
</button>


<h2 style="margin-top:30px;">
Leaderboard<br>
---------------           
</h2>

<div id="leaderboard"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
getDocs,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAw4cJY7oXYrXRyvawehCU7TKCRg5ZS6GY",
authDomain: "world-cup-prediction-1ebca.firebaseapp.com",
projectId: "world-cup-prediction-1ebca",
storageBucket: "world-cup-prediction-1ebca.firebasestorage.app",
messagingSenderId: "950989220636",
appId: "1:950989220636:web:cd9f82db31549fad3068d9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveResult = async function(matchNo) {

const selected = document.querySelector(
`input[name="match${matchNo}"]:checked`
);

if(!selected){
alert("Select result for Match " + matchNo);
return;
}

if(!confirm("Are you sure you want to save this result?")){
    return;
}

const resultDoc = await getDoc(
doc(db,"phase6_results",`match${matchNo}`)
);

if(resultDoc.exists()){
    alert("Result already saved for this match.");
    return;
}

await setDoc(
doc(db,"phase6_results",`match${matchNo}`),
{
winner: selected.value,
locked: true
}
);


const snapshot =
await getDocs(collection(db,"predictions_phase6"));

for(const userDoc of snapshot.docs){

const data = userDoc.data();

  if(data[`match${matchNo}Awarded`]){
    continue;
}
  
let points = data.points || 0;

if(data[`match${matchNo}`] === selected.value){
    points += 2;
}

await updateDoc(
doc(db,"predictions_phase6",userDoc.id),
{
points: points,
[`match${matchNo}Awarded`]: true
}
);
}

await loadLeaderboard();

document.querySelector(
`button[onclick="saveResult(${matchNo})"]`
).disabled = true;

alert("Match " + matchNo + " saved successfully");
}
  
async function loadLeaderboard(){

const leaderboard =
document.getElementById("leaderboard");

const snapshot =
await getDocs(collection(db,"predictions_phase6"));

const users = [];

snapshot.forEach((doc)=>{
users.push(doc.data());
});

users.sort((a,b)=>
(b.points || 0) - (a.points || 0)
);

leaderboard.innerHTML = "";

users.forEach((user,index)=>{

leaderboard.innerHTML += `
<div class="rank-card">
<div>
<b>#${index+1} ${user.name}</b>
</div>

<div>
${user.points || 0} pts
</div>
</div>
`;

});

}

loadLeaderboard();
</script>
</body>
</html>
