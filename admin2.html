<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{
background:#020617;
color:white;
font-family:Poppins,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#0f172a;
padding:30px;
border-radius:20px;
width:300px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-weight:700;
cursor:pointer;
}
</style>
</head>
<body>

<div class="login-box">
<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>
</div>

<script>
function login(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

if(
username === "admin" &&
password === "fifa2026"
){
window.location.href="dashboard2.html";
}
else{
alert("Wrong Username or Password");
}

}
</script>

</body>
</html>
