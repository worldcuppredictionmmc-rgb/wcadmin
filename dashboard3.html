<body>

<h2 style="margin-top:30px;">
Leaderboard<br>
---------------           
</h2>

<div id="leaderboard"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
getDocs,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAw4cJY7oXYrXRyvawehCU7TKCRg5ZS6GY",
authDomain: "world-cup-prediction-1ebca.firebaseapp.com",
projectId: "world-cup-prediction-1ebca",
storageBucket: "world-cup-prediction-1ebca.firebasestorage.app",
messagingSenderId: "950989220636",
appId: "1:950989220636:web:cd9f82db31549fad3068d9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveResult = async function(matchNo) {

const selected = document.querySelector(
`input[name="match${matchNo}"]:checked`
);

if(!selected){
alert("Select result for Match " + matchNo);
return;
}

if(!confirm("Are you sure you want to save this result?")){
    return;
}

const resultDoc = await getDoc(
doc(db,"_results",`match${matchNo}`)
);

if(resultDoc.exists()){
    alert("Result already saved for this match.");
    return;
}

await setDoc(
doc(db,"_results",`match${matchNo}`),
{
winner: selected.value,
locked: true
}
);


const snapshot =
await getDocs(collection(db,"predictions_phase3"));

for(const userDoc of snapshot.docs){

const data = userDoc.data();

if(data[`match${matchNo}Awarded`]){
    continue;
}

let points = data.points || 0;

if(data[`match${matchNo}`] === selected.value){
    points += 2;
}

await updateDoc(
doc(db,"predictions_phase3",userDoc.id),
{
points: points,
[`match${matchNo}Awarded`]: true
}
);

}

await loadLeaderboard();

document.querySelector(
`button[onclick="saveResult(${matchNo})"]`
).disabled = true;

alert("Match " + matchNo + " saved successfully");
  
async function loadLeaderboard(){

const leaderboard =
document.getElementById("leaderboard");

const snapshot =
await getDocs(collection(db,"predictions_phase3"));

const users = [];

snapshot.forEach((doc)=>{
users.push(doc.data());
});

users.sort((a,b)=>
(b.points || 0) - (a.points || 0)
);

leaderboard.innerHTML = "";

users.forEach((user,index)=>{

leaderboard.innerHTML += `
<div class="rank-card">
<div>
<b>#${index+1} ${user.name}</b>
</div>

<div>
${user.points || 0} pts
</div>
</div>
`;

});

}

loadLeaderboard();
</script>
</body>
